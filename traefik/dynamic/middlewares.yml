http:
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

    secure-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: "strict-origin-when-cross-origin"

    lan-only:
      ipAllowList:
        sourceRange:
          - "192.168.1.0/24"
          - "10.22.2.0/24"

    dashboard-auth:
      basicAuth:
        users:
          - "admin:REPLACE_DASHBOARD_BCRYPT"
